name: Build Firmware (PR) on Venice

permissions:
  contents: read

on:
  pull_request:
    paths:
    - 'boards/venice/**'
    - 'include/kernel*'
    - 'package/kernel/**'
    - 'target/linux/imx/**'
    - 'feeds.conf.default'

jobs:
  build-venice:
    name: Build Venice
    uses: ./.github/workflows/build-firmware.yml
    with:
      board: venice
      target: imx
      subtarget: cortexa53
      description: "Gateworks Venice"
