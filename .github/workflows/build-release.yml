name: Build and Release Firmware

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Create and push a new tag (e.g., v1.7.0-rc1). Leave empty to build without creating a tag.'
        required: false
        type: string

jobs:
  build:
    name: Build ${{ matrix.board }}
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: ekh-bcm2711
            target: bcm27xx
            subtarget: bcm2711
            description: "Raspberry Pi 4, CM4"
          - board: ekh-bcm2710
            target: bcm27xx
            subtarget: bcm2710
            description: "Raspberry Pi 3B, 2W"
          - board: venice
            target: imx
            subtarget: cortexa53
            description: "Gateworks Venice, HaLowLink 2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex g++ gawk gcc-multilib g++-multilib \
            git gettext libncurses5-dev libssl-dev python3-setuptools rsync unzip golang-go \
            zlib1g-dev swig file wget libnl-3-dev libnl-genl-3-dev libgps-dev libcap-dev \
            pkg-config libopus-dev libopusfile-dev portaudio19-dev net-tools libpcre3-dev \
            libpcre3 upx-ucl

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            tmp/dl
            staging_dir/host
            staging_dir/hostpkg
            staging_dir/toolchain-*
            build_dir/host
            build_dir/hostpkg
          key: ${{ matrix.board }}-${{ runner.os }}-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ matrix.board }}-${{ runner.os }}-

      - name: Configure build for ${{ matrix.board }}
        run: |
          ./scripts/openmanet_setup.sh -i -b ${{ matrix.board }}

      - name: Download dependencies
        run: |
          make download -j$(nproc)

      - name: Build firmware
        run: |
          make -j$(nproc) V=s 2>&1 | tee build.log
          echo "Build completed for ${{ matrix.board }}"

      - name: Check build output
        run: |
          ls -lah bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/
          echo "=== Images created ==="
          find bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/ -name "*.img.gz" -o -name "*.bin"
          echo "=== Build info files ==="
          find bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/ -name "*.buildinfo"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/${{ matrix.board }}
          cp bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/*.img.gz artifacts/${{ matrix.board }}/ 2>/dev/null || true
          cp bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/*.bin artifacts/${{ matrix.board }}/ 2>/dev/null || true
          cp bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/sha256sums artifacts/${{ matrix.board }}/ 2>/dev/null || true
          cp bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/*.buildinfo artifacts/${{ matrix.board }}/ 2>/dev/null || true
          echo "Board: ${{ matrix.board }}" > artifacts/${{ matrix.board }}/BOARD_INFO.txt
          echo "Description: ${{ matrix.description }}" >> artifacts/${{ matrix.board }}/BOARD_INFO.txt
          echo "Target: ${{ matrix.target }}/${{ matrix.subtarget }}" >> artifacts/${{ matrix.board }}/BOARD_INFO.txt
          echo "Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> artifacts/${{ matrix.board }}/BOARD_INFO.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: artifacts/${{ matrix.board }}/*
          if-no-files-found: error
          retention-days: 90

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.board }}
          path: build.log
          retention-days: 30

