name: Build Firmware for Pull Request

permissions:
  contents: read

on:
  pull_request:
    paths:
    - 'boards/**'
    - 'include/kernel*'
    - 'package/kernel/**'
    - 'target/linux/**'
    - 'feeds.conf.default'

jobs:
  build-ekh-bcm2711:
    name: Build ekh-bcm2711
    uses: ./.github/workflows/build-firmware.yml
    with:
      board: ekh-bcm2711
      target: bcm27xx
      subtarget: bcm2711
      description: "Raspberry Pi 4, CM4"

  build-ekh-bcm2710:
    name: Build ekh-bcm2710
    uses: ./.github/workflows/build-firmware.yml
    with:
      board: ekh-bcm2710
      target: bcm27xx
      subtarget: bcm2710
      description: "Raspberry Pi 3B, 2W"

  build-venice:
    name: Build venice
    uses: ./.github/workflows/build-firmware.yml
    with:
      board: venice
      target: imx
      subtarget: cortexa53
      description: "Gateworks Venice"
