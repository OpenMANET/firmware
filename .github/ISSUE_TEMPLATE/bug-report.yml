name: Bug report
description: Create a bug report to help us improve
labels:
  - bug
  - bug-report
  - to-triage
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenMANET version
      description: |
        The OpenMANET release or commit hash where this bug occurs (use command below).
        ```. /etc/openwrt_release && echo $DISTRIB_DESCRIPTION```
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: OpenMANET target/subtarget
      description: |
        The OpenMANET target and subtarget where this bug is observed (use command below).
        ```. /etc/openwrt_release && echo $DISTRIB_TARGET```
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      description: |
        The device exhibiting this bug (if unsure, use command below).
        ```cat /tmp/sysinfo/model```
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the reported behaviour.
  - type: textarea
    id: behaviour
    attributes:
      label: Actual behaviour
      description: A clear and concise description of what actually happens.
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    id: additional
    attributes:
      label: Additional info
      description: Add any additional info you think might be helfpul.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Please provide relevant log output (use command below to capture system log).
        ```logread```
      render: text
  - type: textarea
    id: dmesg
    attributes:
      label: dmesg output
      description: |
        Please provide relevant kernel message output (use command below to capture kernel messages).
        ```dmesg```
      render: text
  - type: checkboxes
    id: terms
    attributes:
      label: Terms
      description: By submitting this issue, you agree to the terms below.
      options:
        - label: I have not modified the OpenMANET software. (Installed packages that are not included by default).
          required: true
